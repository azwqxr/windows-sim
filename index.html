<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>win simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- winbox -->
  <link rel="stylesheet" href="dist/css/winbox.min.css">
  <script src="dist/js/winbox.min.js"></script>
  <!-- seven dot cee ess ess -->
  <link rel="stylesheet" href="https://unpkg.com/7.css">
  <!-- other -->
  <script src="compat.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <script>
    function openWindow() {
      new WinBox({
        title: "My First Program",
        width: "320px",
        height: "220px",
        x: "center",
        y: "center",
        class: ["no-full"],

        html: `
              <p>Hello, world!</p>

              <section style="display: flex; justify-content: flex-end; gap: 6px;">
                <button class="default">OK</button>
                <button>Cancel</button>
              </section>

              <div role="progressbar" class="animate" style="margin-top: 12px;">
                <div style="width: 60%"></div>
              </div>
        `
      });
    }
    window.onload = openWindow;
  </script>

</body>
</html>
