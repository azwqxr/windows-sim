<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>win simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- seven dot cee ess ess -->
  <link rel="stylesheet" href="https://unpkg.com/7.css">

  <!-- winbox -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/winbox@0.2.82/dist/css/winbox.min.css">
  <script src="https://cdn.jsdelivr.net/npm/winbox@0.2.82/dist/winbox.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }

    /* Button launcher */
    .launch-btn {
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    /* Make WinBox look more “7.css-ish” */
    .winbox {
      border-radius: 6px;
      overflow: hidden;
    }

    .wb-title {
      font-family: "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .wb-body {
      background: #f3f3f3;
    }
  </style>
</head>

<body>

  <button class="launch-btn" onclick="openWindow()">Open Program</button>

  <script>
    function openWindow() {
      new WinBox({
        title: "My First Program",
        width: "320px",
        height: "220px",
        x: "center",
        y: "center",
        class: "no-min no-max", // keeps it simple like a dialog

        html: `
          <div class="window active" style="margin: 0;">
            <div class="window-body has-space">

              <p>Hello, world!</p>

              <section style="display: flex; justify-content: flex-end; gap: 6px;">
                <button class="default">OK</button>
                <button>Cancel</button>
              </section>

              <div role="progressbar" class="animate" style="margin-top: 12px;">
                <div style="width: 60%"></div>
              </div>

            </div>
          </div>
        `
      });
    }

    // auto-open on load (optional)
    window.onload = openWindow;
  </script>

</body>
</html>
